# Blueprint do Render (plano FREE). Importe pelo painel: New > Blueprint.
# Backend como Web Service (Node) + os dois frontends como Static Sites.
# DATABASE_URL você cria à parte (Supabase/Neon free) e cola no env do backend.
services:
  # ---------------- Backend (WebSocket + API) ----------------
  - type: web
    name: volta-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false # cole a connection string do Supabase/Neon no painel
      # REDIS_URL é OPCIONAL — sem ele o backend roda em instância única.

  # ---------------- PWA do co-piloto ----------------
  - type: web
    name: volta-mobile
    runtime: static
    plan: free
    rootDir: apps/mobile
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # cole a URL pública do volta-backend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ---------------- Dashboard (torre) ----------------
  - type: web
    name: volta-dashboard
    runtime: static
    plan: free
    rootDir: apps/dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # cole a URL pública do volta-backend
      - key: VITE_MOBILE_URL
        sync: false # cole a URL pública do volta-mobile (usada nos QR codes)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
