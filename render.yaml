# Blueprint do Render — SERVIÇO ÚNICO (plano free/basic).
# Backend + Mobile PWA + Dashboard, tudo no mesmo processo Node.
# O NestJS serve os frontends como arquivos estáticos:
#   Dashboard → /
#   Mobile    → /mobile/
#   API       → /auth, /health, /race, /admin
#   WebSocket → /socket.io
#
# DATABASE_URL: crie à parte (Supabase/Neon free) e cole no painel do Render.
services:
  - type: web
    name: volta-ao-lago
    runtime: node
    plan: free
    buildCommand: >
      npm install &&
      npm --workspace backend run build &&
      npm --workspace apps/mobile run build &&
      npm --workspace apps/dashboard run build
    startCommand: node backend/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false  # Definir manualmente no painel do Render (não commitar senha!)
      # REDIS_URL é OPCIONAL — sem ele o backend roda em instância única.
